 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado de Inspeção - Douglas</title>
    <style>
        /* Variáveis de Cores para facilitar a troca de tema */
        :root {
            --bg-body: #f4f7f6;
            --bg-container: #ffffff;
            --text-main: #333333;
            --text-secondary: #7f8c8d;
            --border-color: #eeeeee;
            --option-bg: #f9f9f9;
            --option-hover: #eef2f3;
            /* Nova Cor Verde Fluorescente */
            --brand-color: #39FF14; 
            --brand-hover: #32cd32;
        }

        /* Cores do Modo Escuro */
        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-main: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
            --option-bg: #2a2a2a;
            --option-hover: #3d3d3d;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-body); color: var(--text-main); line-height: 1.6; padding: 10px; transition: 0.3s; }
        .container { max-width: 800px; margin: 20px auto; background: var(--bg-container); padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
        .hidden { display: none; }
        
        /* Título e borda em Verde Fluorescente */
        h1 { color: var(--brand-color); text-align: center; border-bottom: 2px solid var(--brand-color); padding-bottom: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        /* Botão de Alternar Tema */
        .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--brand-color); color: black; border: none; padding: 10px; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 1000; display: flex; align-items: center; justify-content: center; }

        /* Botões do Menu principais em Verde com Texto Preto */
        .btn-menu { display: block; width: 100%; padding: 15px; margin: 10px 0; background-color: var(--brand-color); color: black; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-menu:hover { background-color: var(--brand-hover); transform: translateY(-2px); }
        
        .btn-acumulado { background-color: #e74c3c !important; color: white !important; border: 2px solid #c0392b; }
        .btn-continuar { background-color: #e67e22 !important; color: white !important; border: 2px solid #d35400; }
        .badge { background: white; color: #e74c3c; padding: 2px 10px; border-radius: 20px; margin-left: 10px; font-size: 14px; }
        
        .option { background: var(--option-bg); border: 2px solid var(--border-color); padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; color: var(--text-main); }
        .option:hover { background: var(--option-hover); border-color: var(--brand-color); }
        
        /* Feedback */
        .correct-fill { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; font-weight: bold; }
        .wrong-fill { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; font-weight: bold; }
        .disabled { pointer-events: none; opacity: 0.8; }
        
        .nav-btns { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .control-btns { display: flex; justify-content: center; margin-top: 15px; gap: 10px; border-top: 1px solid var(--border-color); padding-top: 15px; }
        
        button { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-prev { background: #95a5a6; color: white; flex: 1; }
        /* Botão Próximo em Verde */
        .btn-next { background: var(--brand-color); color: black; flex: 1; }
        .btn-exit { background: #e74c3c; color: white; }
        .btn-pause { background: #f39c12; color: white; }
        
        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: #e74c3c; font-weight: bold; }
        .result-card { border-bottom: 1px solid var(--border-color); padding: 15px 0; }
        
        .settings-box { margin-top: 30px; padding: 15px; border: 1px dashed var(--text-secondary); border-radius: 8px; text-align: center; }
        .btn-clear { background: none; color: #e74c3c; text-decoration: underline; font-size: 12px; margin: 5px; border: none; cursor: pointer; }

        /* Placar Estilo */
        .score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .score-board { display: flex; gap: 8px; }
        .score-item { display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .score-correct { background-color: rgba(40, 167, 69, 0.2); color: #28a745; border: 1px solid #28a745; }
        .score-wrong { background-color: rgba(220, 53, 69, 0.2); color: #dc3545; border: 1px solid #dc3545; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" title="Trocar Tema">🌓</button>

<div id="menu" class="container">
    <h1>Simulado de Inspeção (PE)</h1>
    
    <button id="btnRefazerTudoErrado" class="btn-menu btn-acumulado hidden" onclick="iniciarSimulado('erros_globais')">
        🚩 REFAZER QUESTÕES ERRADAS <span id="contadorGlobal" class="badge">0</span>
    </button>

    <button id="btnRetomar" class="btn-menu btn-continuar hidden" onclick="retomarSimulado()">
        ⚡ CONTINUAR ONDE PAREI
    </button>

    <hr style="border:0; border-top: 1px solid var(--border-color); margin: 20px 0;">

    <button class="btn-menu" onclick="iniciarSimulado('total')">1 - Simulado Completo (Todas)</button>
    
    <div style="margin: 20px 0; padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; text-align: center;">
        <label>2 - Escolher Prova: </label>
        <select id="escolhaProva" style="padding: 8px; border-radius: 4px; background: var(--option-bg); color: var(--text-main);">
            <option value="1">Prova 01</option>
            <option value="2">Prova 02</option>
            <option value="3">Prova 03</option>
            <option value="4">Prova 04</option>
            <option value="5">Prova 05</option>
            <option value="6">Prova 06</option>
             <option value="7">Prova 07</option>
             <option value="8">Prova 08</option>
         </select>
        <button class="btn-menu" style="width: auto; display: inline-block; margin-left: 10px; padding: 8px 20px;" onclick="iniciarSimulado('especifica')">Iniciar</button>
    </div>
    <button class="btn-menu" onclick="iniciarSimulado('random')">3 - 40 Questões Aleatórias</button>

    <div class="settings-box">
        <p style="margin: 0; font-weight: bold; font-size: 13px; color: var(--text-secondary);">⚙️ Gerenciar Dados:</p>
        <button class="btn-clear" onclick="limparApenasErros()">Limpar Banco de Erros</button>
        <button class="btn-clear" onclick="resetTotal()">Reset Total (Zerar Tudo)</button>
    </div>
</div>

<div id="quiz" class="container hidden">
    <div class="score-header">
        <div id="progresso" style="font-weight: bold; color: var(--text-secondary);"></div>
        <div class="score-board">
            <div class="score-item score-correct">
                <span>✓</span> <span id="count-correct">0</span>
            </div>
            <div class="score-item score-wrong">
                <span>✗</span> <span id="count-wrong">0</span>
            </div>
        </div>
    </div>

    <div id="pergunta" style="font-size: 18px; margin-bottom: 20px; font-weight: 500;"></div>
    <div id="opcoes"></div>
    
    <div class="nav-btns">
        <button class="btn-prev" id="voltar" onclick="mudarQuestao(-1)">← Voltar</button>
        <button class="btn-next" id="avancar" onclick="mudarQuestao(1)">Próxima →</button>
        <button class="btn-next hidden" id="finalizar" onclick="verResultado()">Finalizar Simulado</button>
    </div>

    <div class="control-btns">
        <button class="btn-exit" onclick="sairSemSalvar()">Sair</button>
        <button class="btn-pause" onclick="salvarEPausar()">Salvar e Pausar</button>
    </div>
</div>

<div id="resultado" class="container hidden">
    <h2 id="placar" style="text-align: center;"></h2>
    <div id="detalhes"></div>
    <button class="btn-menu" onclick="location.reload()">Voltar ao Menu</button>
</div>
    
<script>
const bancoQuestoes = [ 

//PROVA 01
{p:1, q:"01)- Para o caso de plataformas marítimas, a técnica de medição de potencial para se verificar o nível de proteção catódica é aplicável:", o:["as regiões submersas ou aéreas.", "aos locais acima do nível máximo de variação do nível de maré.", "as regiões permanentemente submersas.", "somente as regiões enterradas."], r:2},
{p:1, q:"02)- A corrosão eletroquímica promove a passagem do material metálico da forma reduzida para a forma de íons:", o:["positivos.", "eletricamente carregados.", "negativos.", "do tipo ânions."], r:0},
{p:1, q:"03) A medição de potencial com uso do RCV em ângulos agudos é realizada usando-se:", o:["extensores apropriados que garantem uma aproximação nunca inferior a 300 mm.", "eletrodos de referência que permitam com uma distância de 800 mm, boa medição.", "extensores apropriados que permitam medição a uma distância inferior a 50 mm.", "eletrodos de referência apropriados que permitam uma aproximação nunca inferior a 800mm."], r:2},
{p:1, q:"04)- Uma estrutura protegida catodicamente encontra-se polarizada:", o:["catodicamente e anodicamente.", "anodicamente.", "pela geração e adsorção de oxigênio.", "catodicamente."], r:3},
{p:1, q:"05)- Das alternativas abaixo qual delas corresponde ao item “método e ferramentas para preparação da superfície para medição” de um procedimento de medição de potencial eletroquímico por mergulhador:", o:["a limpeza será executada com raspa e escova metálica manual e a área máxima da superfície a ser limpa deverá ser 3 centímetros quadrados.", "em materiais a base de ligas de níquel e aços inoxidáveis austeníticos os discos de desbaste deverão ter alma de nylon e as escovas deverão ser de aço inoxidável ou revestidas com aço inoxidável.", "no ponto a ser medido, a limpeza deve ser apenas a necessária para o perfeito acoplamento da probe do equipamento com a superfície metálica.", "a superfície deverá ser preparada com jato abrasivo de areia e deve atingir o estado definido como jato comercial SAE 2."], r:2},
{p:1, q:"06)- Os voltímetros usados na medição de potencial pelos inspetores submarinos possuem acoplados um eletrodo de referência de:", o:["prata/cloreto de prata água do mar.", "zinco.", "cobre/sulfato de cobre.", "calomelano."], r:0},
{p:1, q:"07)- Na medição do potencial eletroquímico de uma estrutura, o eletrodo de referência deve ficar no eletrólito posicionado:", o:["o mais próximo possível da estrutura sem contato elétrico", "distante da estrutura.", "em contato elétrico com a estrutura.", "muito distante da estrutura."], r:0},
{p:1, q:"08)- O potencial de proteção catódica do aço-carbono na água do mar em relação ao eletrodo de referência prata/cloreto de prata:", o:["-0,800 V.", "-0,650 V.", "-0,850 V.", "-1,050 V."], r:0},
{p:1, q:"09)- A capacidade de corrente de um anodo galvânico representa na unidade de massa:", o:["a diferença de potencial disponível.", "a quantidade de eletricidade disponível.", "a quantidade utilizável do anodo.", "a diferença de desgaste para a corrente disponível."], r:1},
{p:1, q:"10)- A polarização ôhmica ou por resistência é responsável pela formação de um depósito calco-magnésico devido:", o:["ao abaixamento de pH na área catódica.", "ao pH muito baixo na área catódica.", "a elevação do pH na área catódica.", "a neutralização do eletrólito na área catódica."], r:2},
{p:1, q:"11)- Nas plataformas marítimas os anodos galvânicos mais usados são os de:", o:["liga de ferro e liga de zinco.", "liga de alumínio e liga de zinco.", "liga de cobre e liga de zinco.", "liga de chumbo e liga de alumínio."], r:1},
{p:1, q:"12)- A polarização por concentração é caracteristicamente de eletrólitos:", o:["muito concentrados.", "com fortíssimo movimento.", "bastante diluído.", "com pouco ou sem movimento."], r:3},
{p:1, q:"13)- Uma estrutura é dita protegida catodicamente quando seu potencial eletroquímico for:", o:["menos negativo que –0,80V em relação a semicélula de prata/cloreto de prata.", "muto menos negativo que –0,80V em relação a semicélula de prata/cloreto de prata.", "nulo em relação a semicélula de prata/cloreto de prata.", "mais negativo que –0,80V em relação a semicélula de prata/cloreto de prata."], r:3},
{p:1, q:"14)- A superproteção em uma plataforma tem como inconveniente a possibilidade de gerar trincas:", o:["na alma dos anodos que possibilitem a sua queda.", "na estrutura que poderão acelerar falhas por fadiga.", "nos anodos que poderão acelerar falhas por fadiga.", "nos anodos e nas almas dos anodos que poderão acelerar falhas por fadiga."], r:1},
{p:1, q:"15)- A corrosividade de um eletrólito depende entre outros fatores de sua resistividade. No caso da água do mar, em mar aberto, o valor da resistividade situa-se de modo geral, na seguinte faixa:", o:["0,20 a 0,35 ohm.cm.", "2.000 a 4.000 ohm.cm.", "nenhuma das respostas.", "3.000 a 5.000 ohm.cm."], r:2},
{p:1, q:"16)- Uma estrutura protegida catodicamente fica polarizada por ativação devido ao:", o:["cloro e ao oxigênio liberados.", "cloro liberado.", "hidrogênio liberado.", "oxigênio liberado."], r:2},
{p:1, q:"17)- A medição de potencial eletroquímico é sempre realizada entre uma estrutura e:", o:["uma outra estrutura.", "um anodo galvânico de estrutura.", "uma referência qualquer.", "uma semicélula de referência."], r:3},
{p:1, q:"18)- Em uma estrutura revestida a distribuição dos anodos galvânicos permite que se tenha maior espaçamento entre eles porque é:", o:["mais fácil polarizar uma estrutura revestida.", "impossível polarizar uma estrutura revestida.", "indiferente polarizar uma estrutura revestida ou não revestida.", "mais difícil polarizar uma estrutura revestida."], r:0},
{p:1, q:"19)- A proteção catódica galvânica quando bem projetada tende a apresentar no que concerne a distribuição da corrente:", o:["uma distribuição muito pouco uniforme.", "uma distribuição muito pior do que na corrente impressa.", "uma distribuição que enseja com facilidade a superproteção.", "uma distribuição muito boa se comparada a corrente impressa."], r:3},
{p:1, q:"20)- Na superfície de uma estrutura protegida catodicamente há uma:", o:["elevação do pH.", "diminuição do pH.", "anulação do pH.", "neutralização do pH."], r:0},
{p:1, q:"21)- os voltímetros para medição de potencial em proteção catódica devem apresentar:", o:["resistência interna baixíssima e fixa.", "elevada resistência interna.", "baixa resistência interna.", "resistência interna variável."], r:1},
{p:1, q:"22)- Nos processos de corrosão eletroquímica o material metálico se transforma em um:", o:["metal puríssimo.", "sal neutro.", "composto.", "composto intermetálico."], r:2},
{p:1, q:"23)- O potencial eletroquímico de um anodo de liga de alumínio de boa qualidade imerso no mar, medido em relação a uma semicélula de prata/cloreto de prata situa-se em torno de:", o:["-1,050V.", "-1,000V.", "-1,550V.", "-0,850V."], r:0},
{p:1, q:"24)-Na medição de potencial de uma estrutura marítima o voltímetro deverá ficar:", o:["imerso ou emerso em relação ao eletrólito dependendo da técnica de medição.", "alguns instantes apenas fora do eletrólito.", "pelo menos algum tempo imerso no eletrólito.", "sempre imerso no eletrólito."], r:0},
{p:1, q:"25)-Em uma plataforma fixa de produção as regiões que podem ser protegidas catodicamente são as superfícies:", o:["enterradas ou submersas.", "enterradas, submersas ou aéreas.", "aéreas ou enterradas.", "aéreas ou submersas."], r:0},
{p:1, q:"26)- A pilha ativa-passiva é característica dos materiais formadores de:", o:["películas muito porosas.", "películas passivantes.", "película solúvel.", "película sem aderência."], r:1},
{p:1, q:"27)- O contato elétrico entre o instrumento de medição de potencial e a estrutura tem:", o:["a tendência a evitar a despolarização.", "a tendência de causar a despolarização.", "grande influência no resultado da medição.", "insuficiência insignificante na medição."], r:1},
{p:1, q:"28)- Em uma estrutura revestida a distribuição dos anodos galvânicos permite que se tenha um maior espaçamento entre eles porque é:", o:["mais difícil polarizar uma estrutura revestida.", "mais fácil polarizar uma estrutura revestida.", "impossível polarizar uma estrutura revestida.", "indiferente polarizar uma estrutura revestida ou não revestida."], r:1},
{p:1, q:"29)- A medida do potencial de proteção catódica consiste na determinação de uma diferença de potencial entre:", o:["um ponto da estrutura e eletrólito sem eletrodo de referência.", "um ponto da estrutura e o anodo mais próximo.", "dois pontos da estrutura.", "um ponto da estrutura e um eletrodo de referência."], r:3},
{p:1, q:"30) A medição de potencial eletroquímico é sempre realizada entre uma estrutura e:", o:["uma semicélula de referência.", "uma outra estrutura.", "uma referência qualquer.", "um anodo galvânico da estrutura."], r:0},
{p:1, q:"31)- A corrosividade de um eletrólito depende entre outros fatores de sua resistividade. No caso da água do mar, em mar aberto, o valor da resistividade situa-se de modo geral, na seguinte faixa:", o:["0,20 a 0,35 ohm.cm.", "2.000 a 4.000 ohm.cm.", "20 a 35 ohm.cm.", "3.000 a 5.000 ohm.cm."], r:2},
{p:1, q:"32)- Uma estrutura protegida catodicamente encontra-se polarizada:", o:["catodicamente e anodicamente.", "anodicamente.", "pela geração e adsorção de oxigênio.", "catodicamente."], r:3},
{p:1, q:"33)- A polarização por ativação na área catódica se dá pela sobretensão ou sobrevoltagem do:", o:["oxigênio do meio.", "oxigênio e do cloro.", "hidrogênio liberado.", "cloro liberado."], r:2},
{p:1, q:"34)- A capacidade de corrente de um anodo galvânico representa na sua massa:", o:["a quantidade utilizável do anodo.", "a diferença de potencial disponível.", "a diferença de desgaste para a corrente disponível.", "a quantidade de eletricidade disponível."], r:3},
{p:1, q:"35)- O aumento da velocidade relativa metal/eletrólito na água do mar, aumenta a taxa de corrosão porque aumenta:", o:["a despolarização catódica.", "a polarização catódica.", "a passivação catódica.", "a imunização."], r:0},
{p:1, q:"36)- Potencial eletroquímico de redução é a diferença de potencial natural que ocorre entre um material metálico e um eletrodo devido à tendência:", o:["a redução do metal sob a forma não iônica.", "a passagem de íons do eletrólito para o metal.", "a oxidação de íons do metal solução.", "a passagem de íons do metal para o eletrólito."], r:1},
{p:1, q:"37)- Os voltímetros usados na medição de potencial pelos inspetores submarinos possuem acoplados um eletrodo de referência de:", o:["zinco.", "calomelano.", "prata/cloreto de prata água do mar.", "cobre/sulfato de cobre."], r:2},
{p:1, q:"38)- O produto de corrosão nos processos de natureza eletroquímica forma-se, em geral, pela precipitação de um composto insolúvel originado entre:", o:["íons do metal e íons do eletrólito, principalmente OH-.", "íons do metal e íons H+ do eletrólito.", "íons contidos no eletrólito, excetos os do metal.", "íons H+ e outros íons do eletrólito, exceto os do metal."], r:0},
{p:1, q:"39)- O aumento da aeração de um eletrólito na pressão atmosférica", o:["aumenta a taxa de corrosão.", "diminui de início e depois aumenta as taxas de corrosão.", "diminui as taxas de corrosão.", "não tem influência nas taxas de corrosão."], r:0},
{p:1, q:"40)- As regiões enterradas de uma plataforma marítima, que são constituídas pelas estacas têm seus anodos para proteção catódica instalados:", o:["na parte inferior da jaqueta.", "fora da jaqueta.", "na parte superior da jaqueta.", "enterrados no fundo do mar."], r:0},

//PROVA 02
{p:2, q:"41)- Se na tabela padrão de potenciais eletroquímicos de oxidação forem considerados dois materiais, o que está acima na tabela será:", o:["mais catódico que o que está abaixo.", "mais nobre que o que está abaixo.", "menos reativo que o que está abaixo.", "mais anódico que o que está abaixo."], r:3},

{p:2, q:"46)- A polarização por concentração é característica de eletrólitos:", o:["com fortíssimo movimento.", "bastante diluídos.", "com pouco ou sem movimento.", "muito concentrados."], r:2},
{p:2, q:"47)- A superproteção em uma plataforma tem como inconveniente a possibilidade de gerar trincas:", o:["na alma dos anodos que possibilitem a sua queda.", "na estrutura que poderão acelerar falhas por fadiga.", "nos anodos que poderão acelerar falhas por fadiga.", "nos anodos e nas almas dos anodos que poderão acelerar falhas por fadiga."], r:1},
{p:2, q:"48)- Quando se mede o potencial de uma estrutura catodicamente protegida procura-se verificar o potencial:", o:["natural da estrutura.", "de proteção catódica da estrutura.", "de proteção anódica.", "de corrosão."], r:1},

let questoesAtuais = [];
let indexAtual = 0;
let respostasUsuario = [];

window.onload = function() {
    // Aplicar tema salvo
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    atualizarBotaoErros();
    if (localStorage.getItem('progressoDouglas')) {
        document.getElementById('btnRetomar').classList.remove('hidden');
    }
};

function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
}

function atualizarBotaoErros() {
    const listaErros = JSON.parse(localStorage.getItem('bancoErrosAcumulados') || "[]");
    const btn = document.getElementById('btnRefazerTudoErrado');
    const contador = document.getElementById('contadorGlobal');
    if (listaErros.length > 0) {
        btn.classList.remove('hidden');
        contador.innerText = listaErros.length;
    } else {
        btn.classList.add('hidden');
    }
}

function iniciarSimulado(tipo) {
    const escolha = document.getElementById('escolhaProva').value;
    if (tipo === 'total') questoesAtuais = [...bancoQuestoes];
    else if (tipo === 'especifica') questoesAtuais = bancoQuestoes.filter(q => q.p == escolha);
    else if (tipo === 'random') questoesAtuais = [...bancoQuestoes].sort(() => 0.5 - Math.random()).slice(0, 40);
    else if (tipo === 'erros_globais') questoesAtuais = JSON.parse(localStorage.getItem('bancoErrosAcumulados') || "[]");

    if (questoesAtuais.length === 0) return alert("Nenhuma questão encontrada!");
    indexAtual = 0;
    respostasUsuario = new Array(questoesAtuais.length).fill(null);
    exibirQuiz();
}

function exibirQuiz() {
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    mostrarQuestao();
}

function mostrarQuestao() {
    const q = questoesAtuais[indexAtual];
    document.getElementById('progresso').innerText = `Questão ${indexAtual + 1} de ${questoesAtuais.length}`;
    document.getElementById('pergunta').innerText = q.q;
    
    let html = "";
    const jaRespondeu = respostasUsuario[indexAtual] !== null;

    q.o.forEach((opt, i) => {
        let classeExtra = "";
        if (jaRespondeu) {
            if (i === q.r) classeExtra = "correct-fill disabled"; 
            else if (i === respostasUsuario[indexAtual]) classeExtra = "wrong-fill disabled"; 
            else classeExtra = "disabled"; 
        }
        html += `<div class="option ${classeExtra}" onclick="selecionar(${i})">${opt}</div>`;
    });

    document.getElementById('opcoes').innerHTML = html;
    document.getElementById('voltar').style.visibility = indexAtual === 0 ? 'hidden' : 'visible';
    document.getElementById('avancar').classList.toggle('hidden', indexAtual === questoesAtuais.length - 1);
    document.getElementById('finalizar').classList.toggle('hidden', indexAtual !== questoesAtuais.length - 1);
    atualizarPlacarAoVivo();
}

function selecionar(i) {
    if (respostasUsuario[indexAtual] === null) {
        respostasUsuario[indexAtual] = i;
        mostrarQuestao(); 
        atualizarPlacarAoVivo();
    }
}

function atualizarPlacarAoVivo() {
    let acertos = 0;
    let erros = 0;
    respostasUsuario.forEach((resp, i) => {
        if (resp !== null) {
            if (resp === questoesAtuais[i].r) acertos++;
            else erros++;
        }
    });
    document.getElementById('count-correct').innerText = acertos;
    document.getElementById('count-wrong').innerText = erros;
}

function mudarQuestao(p) {
    indexAtual += p;
    mostrarQuestao();
}

function salvarEPausar() {
    const dados = { questoes: questoesAtuais, index: indexAtual, respostas: respostasUsuario };
    localStorage.setItem('progressoDouglas', JSON.stringify(dados));
    alert("Progresso salvo!");
    location.reload();
}

function sairSemSalvar() {
    if(confirm("Sair agora?")) location.reload();
}

function retomarSimulado() {
    const salvo = JSON.parse(localStorage.getItem('progressoDouglas'));
    if (salvo) {
        questoesAtuais = salvo.questoes;
        indexAtual = salvo.index;
        respostasUsuario = salvo.respostas;
        exibirQuiz();
    }
}

function verResultado() {
    localStorage.removeItem('progressoDouglas');
    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('resultado').classList.remove('hidden');
    let acertos = 0;
    let html = "";
    let listaErros = JSON.parse(localStorage.getItem('bancoErrosAcumulados') || "[]");

    questoesAtuais.forEach((q, i) => {
        const acertou = respostasUsuario[i] === q.r;
        if(acertou) {
            acertos++;
            listaErros = listaErros.filter(item => item.q !== q.q);
        } else {
            if (!listaErros.find(item => item.q === q.q)) listaErros.push(q);
        }
        html += `<div class="result-card"><p><strong>${i+1}. ${q.q}</strong></p><p>Sua Resposta: <span class="${acertou?'correct':'wrong'}">${respostasUsuario[i]!==null?q.o[respostasUsuario[i]]:'Vazio'}</span></p>${!acertou?`<p>Correta: <span class="correct">${q.o[q.r]}</span></p>`:''}</div>`;
    });

    localStorage.setItem('bancoErrosAcumulados', JSON.stringify(listaErros));
    document.getElementById('placar').innerText = `Total: ${acertos} de ${questoesAtuais.length}`;
    document.getElementById('detalhes').innerHTML = html;
}

function limparApenasErros() {
    if(confirm("Zerar banco de erros?")) {
        localStorage.removeItem('bancoErrosAcumulados');
        location.reload();
    }
}

function resetTotal() {
    if(confirm("Zerar tudo?")) {
        localStorage.clear();
        location.reload();
    }
}
</script>
